naftiko: 1.0.0-alpha2
info:
  label: TrueLayer Payments API — Payouts
  description: 'TrueLayer Payments API — Payouts. 2 operations. Lead operation: Create Payout. Self-contained Naftiko capability
    covering one Truelayer business surface.'
  tags:
  - Truelayer
  - Payouts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TRUELAYER_API_KEY: TRUELAYER_API_KEY
capability:
  consumes:
  - type: http
    namespace: payments-payouts
    baseUri: https://api.truelayer.com
    description: TrueLayer Payments API — Payouts business capability. Self-contained, no shared references.
    resources:
    - name: v3-payouts
      path: /v3/payouts
      operations:
      - name: createpayout
        method: POST
        description: Create Payout
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Tl-Signature
          in: header
          type: string
          required: true
        - name: Idempotency-Key
          in: header
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v3-payouts-id
      path: /v3/payouts/{id}
      operations:
      - name: getpayout
        method: GET
        description: Get Payout
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.TRUELAYER_API_KEY}}'
  exposes:
  - type: rest
    namespace: payments-payouts-rest
    port: 8080
    description: REST adapter for TrueLayer Payments API — Payouts. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v3/payouts
      name: v3-payouts
      description: REST surface for v3-payouts.
      operations:
      - method: POST
        name: createpayout
        description: Create Payout
        call: payments-payouts.createpayout
        with:
          Tl-Signature: rest.Tl-Signature
          Idempotency-Key: rest.Idempotency-Key
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v3/payouts/{id}
      name: v3-payouts-id
      description: REST surface for v3-payouts-id.
      operations:
      - method: GET
        name: getpayout
        description: Get Payout
        call: payments-payouts.getpayout
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payments-payouts-mcp
    port: 9090
    transport: http
    description: MCP adapter for TrueLayer Payments API — Payouts. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: create-payout
      description: Create Payout
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: payments-payouts.createpayout
      with:
        Tl-Signature: tools.Tl-Signature
        Idempotency-Key: tools.Idempotency-Key
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-payout
      description: Get Payout
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: payments-payouts.getpayout
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
