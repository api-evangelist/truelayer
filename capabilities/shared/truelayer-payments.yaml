naftiko: "1.0.0-alpha1"

info:
  label: "TrueLayer Payments API"
  description: >-
    TrueLayer Payments API v3 for creating and managing open banking payments,
    mandates, payouts, and refunds across UK and EU banks.
  tags:
    - TrueLayer
    - Open Banking
    - Payments
    - VRP
    - Payouts
    - Refunds
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TRUELAYER_ACCESS_TOKEN: TRUELAYER_ACCESS_TOKEN
      TRUELAYER_SIGNING_KEY: TRUELAYER_SIGNING_KEY

capability:
  consumes:
    - type: http
      namespace: truelayer-payments
      baseUri: https://api.truelayer.com
      description: "TrueLayer Payments API v3"
      authentication:
        type: bearer
        token: "{{TRUELAYER_ACCESS_TOKEN}}"
      resources:
        - name: payments
          path: /v3/payments
          description: "Payment creation and management"
          operations:
            - name: create-payment
              method: POST
              description: "Create a new bank payment"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  amount_in_minor: "{{tools.amount_in_minor}}"
                  currency: "{{tools.currency}}"
                  payment_method: "{{tools.payment_method}}"
                  user: "{{tools.user}}"
                  metadata: "{{tools.metadata}}"

        - name: payment
          path: /v3/payments/{id}
          description: "Individual payment operations"
          operations:
            - name: get-payment
              method: GET
              description: "Get payment status and details"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Payment UUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: payment-refunds
          path: /v3/payments/{id}/refunds
          description: "Refund management for payments"
          operations:
            - name: create-refund
              method: POST
              description: "Create a refund for a payment"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  amount_in_minor: "{{tools.amount_in_minor}}"
                  reference: "{{tools.reference}}"
            - name: list-payment-refunds
              method: GET
              description: "List refunds for a payment"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: mandates
          path: /v3/mandates
          description: "VRP mandate management"
          operations:
            - name: create-mandate
              method: POST
              description: "Create a VRP mandate"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  mandate: "{{tools.mandate}}"
                  currency: "{{tools.currency}}"
                  user: "{{tools.user}}"
                  constraints: "{{tools.constraints}}"

        - name: mandate
          path: /v3/mandates/{id}
          description: "Individual mandate operations"
          operations:
            - name: get-mandate
              method: GET
              description: "Get mandate by ID"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: revoke-mandate
              method: DELETE
              description: "Revoke a VRP mandate"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: payouts
          path: /v3/payouts
          description: "Merchant account payouts"
          operations:
            - name: create-payout
              method: POST
              description: "Create a payout from merchant account"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  merchant_account_id: "{{tools.merchant_account_id}}"
                  amount_in_minor: "{{tools.amount_in_minor}}"
                  currency: "{{tools.currency}}"
                  beneficiary: "{{tools.beneficiary}}"

        - name: payout
          path: /v3/payouts/{id}
          description: "Individual payout status"
          operations:
            - name: get-payout
              method: GET
              description: "Get payout status"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: merchant-accounts
          path: /v3/merchant-accounts
          description: "Merchant account management"
          operations:
            - name: list-merchant-accounts
              method: GET
              description: "List all merchant accounts"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: merchant-account
          path: /v3/merchant-accounts/{id}
          description: "Individual merchant account"
          operations:
            - name: get-merchant-account
              method: GET
              description: "Get merchant account and balance"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: merchant-account-transactions
          path: /v3/merchant-accounts/{id}/transactions
          description: "Merchant account transaction history"
          operations:
            - name: list-merchant-account-transactions
              method: GET
              description: "List merchant account transactions"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                - name: from
                  in: query
                  type: string
                  required: false
                - name: to
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8103
      namespace: truelayer-rest
      resources:
        - path: /v1/payments
          name: payments
          operations:
            - method: POST
              name: create-payment
              description: "Create payment"
              call: "truelayer-payments.create-payment"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: GET
              name: list-merchant-accounts
              description: "List merchant accounts"
              call: "truelayer-payments.list-merchant-accounts"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: truelayer-mcp
      transport: http
      tools:
        - name: create-payment
          description: "Create an open banking payment"
          hints:
            readOnly: false
          call: "truelayer-payments.create-payment"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-payment
          description: "Get payment status"
          hints:
            readOnly: true
          call: "truelayer-payments.get-payment"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-merchant-accounts
          description: "List merchant accounts"
          hints:
            readOnly: true
          call: "truelayer-payments.list-merchant-accounts"
          outputParameters:
            - type: object
              mapping: "$."
