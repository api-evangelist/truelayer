aid: truelayer
name: TrueLayer
description: >-
  TrueLayer is Europe's leading open banking platform providing unified access
  to bank data, payments, payouts, refunds, and variable recurring payments
  across the UK and EU. TrueLayer connects to 69+ financial institutions and
  enables instant bank payments, data enrichment, and account verification
  through a single API.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Data API
  - Financial Services
  - Open Banking
  - Payments
  - PSD2
  - UK Banking
  - VRP
url: >-
  https://raw.githubusercontent.com/api-evangelist/truelayer/refs/heads/main/apis.yml
created: '2026-03-27'
modified: '2026-05-03'
specificationVersion: '0.19'
apis:
  - aid: truelayer:payments-api
    name: TrueLayer Payments API
    description: >-
      The TrueLayer Payments API v3 enables creation and management of open
      banking payments, payouts, refunds, and variable recurring payment
      mandates. Supports closed-loop pay-ins, single external payments, VRP
      mandates, merchant account management, and full webhook event coverage
      across UK and EU markets.
    humanURL: https://docs.truelayer.com/docs/payments-api-basics
    baseURL: https://api.truelayer.com
    tags:
      - Open Banking
      - Payments
      - Payouts
      - Refunds
      - VRP
    properties:
      - type: Documentation
        url: https://docs.truelayer.com/docs/payments-api-basics
      - type: GettingStarted
        url: https://docs.truelayer.com/docs/create-a-payment
      - type: Webhooks
        url: https://docs.truelayer.com/docs/payments-api-webhook-reference
      - type: OpenAPI
        url: https://raw.githubusercontent.com/api-evangelist/truelayer/refs/heads/main/openapi/truelayer-payments-openapi.yml
